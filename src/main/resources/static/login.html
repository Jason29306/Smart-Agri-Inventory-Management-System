<!DOCTYPE html>
<html>
<head>
  <title>Smart Agri Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/jpg" href="favicron.jpg">
</head>
<body>

<div class="navbar">
  <a href="index.html">Dashboard</a>
  <a href="products.html">Inventory</a>
  <a href="add-product.html">Add Product</a>
  <a href="supplier.html">Suppliers</a>
  <a href="purchase.html">Purchases</a>
  <a href="sales.html">Sales</a>
  <a href="stock.html">Stock Monitoring</a>
  <a href="login.html">Login</a>
</div>

<div style="display:flex;justify-content:center;align-items:center;height:80vh;">

  <div class="card" style="width:400px;text-align:center;">

    <h1>Smart Agri Inventory</h1>
    <h3>Login to Continue</h3>

    <form id="loginForm">

      <input
              type="text"
              id="username"
              placeholder="Enter Username"
              required>

      <br><br>

      <input
              type="password"
              id="password"
              placeholder="Enter Password"
              required>

      <br><br>

      <button type="submit">
        Login
      </button>

    </form>

    <h3 id="result"></h3>

  </div>

</div>

<script>

  document.getElementById("loginForm")
  .addEventListener("submit", async function(e){

      e.preventDefault();

      const user = {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value
      };

      const response = await fetch(
          "http://localhost:8080/auth/login",
          {
              method:"POST",
              headers:{
                  "Content-Type":"application/json"
              },
              body:JSON.stringify(user)
          });

      const result = await response.text();

      if(result === "Login Successful"){

          document.getElementById("result").innerHTML =
              "✅ Login Successful";

          setTimeout(() => {
              window.location.href = "index.html";
          }, 1000);

      }else{

          document.getElementById("result").innerHTML =
              "❌ Invalid Username or Password";
      }
  });

</script>

</body>
</html>
